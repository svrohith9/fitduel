name: 💡 Feature request
description: Suggest an idea for FitDuel.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! A clear, focused request helps us ship it faster.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user pain first, not the solution.
      placeholder: "When my partner misses a day, our streak breaks. It feels like a punishment, not motivation."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
      placeholder: "Let me gift my partner a 'Streak Shield' that protects one missed day."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - Small (few hours)
        - Medium (a day or two)
        - Large (week+)
        - I'm not sure

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I've searched existing issues for duplicates
          required: true
        - label: This feature fits FitDuel's "fair, motivating, couple/squad" scope
          required: true
